<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LABS Admin — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;1,9..144,400;1,9..144,500&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090e;--s1:rgba(255,255,255,.028);--s2:rgba(255,255,255,.048);--s3:rgba(255,255,255,.07);
  --sh:rgba(255,255,255,.08);--bd:rgba(255,255,255,.055);--bdh:rgba(255,255,255,.1);
  --t:#e6e8f0;--t2:#a0a5b8;--t3:#686d82;--t4:#3f4358;
  --amber:#f0a94e;--amber-s:#f7c97a;--amber-g:rgba(240,169,78,.07);--amber-f:rgba(240,169,78,.12);
  --indigo:#818cf8;--indigo-g:rgba(129,140,248,.07);
  --teal:#2dd4bf;--rose:#fb7185;--green:#4ade80;
  --gold:#c9a84c;
  --sf:'Fraunces',Georgia,serif;--ss:'DM Sans',system-ui,sans-serif;--sm:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t);font-family:var(--ss);font-weight:400;line-height:1.7;-webkit-font-smoothing:antialiased;font-size:15px;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

.bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg .orb{position:absolute;border-radius:50%;filter:blur(100px);animation:drift 25s ease-in-out infinite}
.bg .o1{width:600px;height:600px;top:-10%;left:20%;background:rgba(240,169,78,.022)}
.bg .o2{width:500px;height:500px;bottom:0%;right:5%;background:rgba(129,140,248,.018);animation-delay:-10s}
.bg .o3{width:300px;height:300px;top:50%;left:50%;background:rgba(45,212,191,.012);animation-delay:-17s}
.bg .star{position:absolute;width:1.5px;height:1.5px;background:rgba(255,255,255,.12);border-radius:50%;animation:twinkle 5s ease-in-out infinite}
.bg .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 0%,transparent 100%)}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(18px,-12px) scale(1.06)}}
@keyframes twinkle{0%,100%{opacity:.08}50%{opacity:.4}}

.login-wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:20px}

.login-logo{text-align:center;margin-bottom:40px}
.logo-mark{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#8a6e28,var(--gold));display:flex;align-items:center;justify-content:center;font-family:var(--sm);font-size:18px;font-weight:800;color:var(--bg);margin:0 auto 14px;box-shadow:0 0 40px rgba(201,168,76,.25)}
.logo-name{font-family:var(--sm);font-size:11px;font-weight:600;letter-spacing:3.5px;color:var(--t3);text-transform:uppercase;margin-bottom:4px}
.logo-sub{font-family:var(--sm);font-size:9px;font-weight:500;letter-spacing:2px;color:var(--t4);text-transform:uppercase}

.login-card{background:var(--s1);border:1px solid var(--bd);border-radius:20px;padding:36px;backdrop-filter:blur(10px)}

.login-title{font-family:var(--sf);font-size:26px;font-weight:500;letter-spacing:-.5px;margin-bottom:4px}
.login-title em{font-style:italic;color:var(--amber)}
.login-desc{font-size:13px;color:var(--t3);margin-bottom:28px}

.field{margin-bottom:16px}
.field label{display:block;font-family:var(--sm);font-size:9.5px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-bottom:8px}
.field input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:10px;padding:12px 16px;color:var(--t);font-family:var(--ss);font-size:14px;outline:none;transition:border-color .2s,background .2s}
.field input:focus{border-color:rgba(240,169,78,.3);background:rgba(240,169,78,.04)}
.field input::placeholder{color:var(--t4)}

.field-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.field-row label{font-family:var(--sm);font-size:9.5px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-bottom:0}
.forgot{font-family:var(--sm);font-size:9px;color:var(--t4);text-decoration:none;letter-spacing:.5px;transition:color .2s}
.forgot:hover{color:var(--amber)}

.btn-login{width:100%;background:linear-gradient(135deg,rgba(240,169,78,.15),rgba(240,169,78,.08));border:1px solid rgba(240,169,78,.25);border-radius:10px;padding:13px;color:var(--amber);font-family:var(--sm);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:8px;position:relative;overflow:hidden}
.btn-login:hover{background:linear-gradient(135deg,rgba(240,169,78,.22),rgba(240,169,78,.12));border-color:rgba(240,169,78,.4);transform:translateY(-1px);box-shadow:0 8px 24px rgba(240,169,78,.12)}
.btn-login:active{transform:translateY(0)}
.btn-login.loading{pointer-events:none;opacity:.7}
.btn-login .spinner{display:none;width:14px;height:14px;border:2px solid rgba(240,169,78,.3);border-top-color:var(--amber);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
.btn-login.loading .spinner{display:block}
.btn-login.loading .btn-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bd)}
.divider span{font-family:var(--sm);font-size:9px;color:var(--t4);letter-spacing:1px}

.security-badge{display:flex;align-items:center;justify-content:center;gap:6px;font-family:var(--sm);font-size:9px;color:var(--t4);letter-spacing:.5px}
.security-badge .dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(74,222,128,.5)}

.error-msg{background:rgba(251,113,133,.08);border:1px solid rgba(251,113,133,.15);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--rose);margin-bottom:16px;display:none}
.error-msg.show{display:block}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.login-wrap{animation:fadeUp .5s ease both}
</style>
</head>
<body>

<div class="bg">
  <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
  <div class="grid"></div>
  <div class="star" style="top:10%;left:15%"></div>
  <div class="star" style="top:8%;left:72%;animation-delay:-1.4s"></div>
  <div class="star" style="top:80%;left:25%;animation-delay:-2.8s"></div>
  <div class="star" style="top:65%;left:85%;animation-delay:-.6s"></div>
  <div class="star" style="top:30%;left:90%;animation-delay:-3.2s"></div>
</div>

<div class="login-wrap">
  <div class="login-logo">
    <div class="logo-mark">L</div>
    <div class="logo-name">LABS</div>
    <div class="logo-sub">Admin Console</div>
  </div>

  <div class="login-card">
    <h1 class="login-title">Welcome <em>back</em></h1>
    <p class="login-desc">Sign in to manage your society members, content, and messages.</p>

    <div class="error-msg" id="errorMsg">Invalid credentials. Please try again.</div>

    <div class="field">
      <label>Email address</label>
      <input type="email" id="email" placeholder="admin@longevitylabs.com" autocomplete="email">
    </div>

    <div class="field">
      <div class="field-row">
        <label>Password</label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>
      <input type="password" id="password" placeholder="••••••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span class="btn-text">Sign In to Console</span>
      <div class="spinner"></div>
    </button>

    <div class="divider"><span>secured access</span></div>

    <div class="security-badge">
      <span class="dot"></span>
      Admin-only portal · Longevity &amp; Biohacking Society
    </div>
  </div>
</div>

<script>
// Demo credentials — replace with real auth
const ADMIN_EMAIL = 'admin@longevitylabs.com';
const ADMIN_PASS  = 'labs2025';

function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  const btn   = document.getElementById('loginBtn');
  const err   = document.getElementById('errorMsg');

  err.classList.remove('show');
  btn.classList.add('loading');

  setTimeout(() => {
    btn.classList.remove('loading');
    if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
      sessionStorage.setItem('labs_admin', '1');
      window.location.href = 'admin-dashboard.html';
    } else {
      err.classList.add('show');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  }, 900);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
